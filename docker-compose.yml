services:
  mysql:
    image: mysql:8.0
    container_name: monipoch-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: monipoch_root
      MYSQL_DATABASE: monipoch
      MYSQL_USER: monipoch
      MYSQL_PASSWORD: monipoch_dev
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: monipoch-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data:
